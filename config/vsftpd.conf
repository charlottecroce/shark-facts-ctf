# read-only file server (Flag 2 / Flag 3 live here)
listen=YES
listen_ipv6=NO

# no anonymous access. players need the diver credentials from Flag 1
anonymous_enable=NO
local_enable=YES

# READ ONLY
write_enable=NO

# lock each user into their home directory
chroot_local_user=YES
allow_writeable_chroot=YES

# show the flag.abc file and let it be downloaded
local_umask=022
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES

# banner
ftpd_banner=Welcome to Charlotte's shark file server. Dive in.

# passive mode settings so this works inside Docker
pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30009

# containers + vsftpd need these to avoid 500 OOPS errors
seccomp_sandbox=NO
pam_service_name=vsftpd

# restrict logins to the diver account only
userlist_enable=YES
userlist_deny=NO
userlist_file=/etc/vsftpd.userlist
